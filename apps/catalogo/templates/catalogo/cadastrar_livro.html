{% extends "base.html" %}

{% block title %}Cadastrar Livro{% endblock title %}

{% block content %}
  <h1>{% if livro %}Editar Livro{% else %}Cadastrar Novo Livro{% endif %}</h1>

  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Salvar</button>
  </form>

  <a href="{% url 'catalogo:lista_livros' %}">Voltar ao catálogo</a>
{% endblock content %}
